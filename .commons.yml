graph:
  name: claude-code-plugins        # becomes domain: on notes this graph promotes
  root: knowledge/
  atlas: principium.md
types:
  evidence:   { name: observation, dir: observations/, supports: patterns-or-decisions }
  attractors:
    - { name: pattern,  dir: patterns/ }     # open — accumulates evidence, no verdict
    - { name: decision, dir: decisions/ }    # settled — a design choice with its reasoning
  entity:
    - { name: plugin, dir: entities/ }       # lookup notes for named plugins
    - { name: skill,  dir: entities/ }       # lookup notes for named skills
  reference:  { name: reference, dir: reference/ }
sources:
  - { type: chronicle, path: docs/chronicle/, glob: "20*.md" }
  - { type: claude-code-docs, resolve: url }        # on-demand, hand-fed — no queue
sinks:
  - { name: tasks, tool: td, project: "claude code marketplace", approval: batch }
promotes-to: ~/Developer/commons

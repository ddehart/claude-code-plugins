graph:
  name: claude-code-plugins        # becomes domain: on notes this graph promotes
  root: knowledge/
  atlas: principium.md
types:
  evidence:   { name: observation, dir: observations/, supports: patterns-or-decisions }
  attractors:
    - { name: pattern,  dir: patterns/ }     # open — accumulates evidence, no verdict
    - { name: decision, dir: decisions/ }    # settled — a design choice with its reasoning
  entity:
    - { name: plugin, dir: entities/ }       # lookup notes for named plugins
    - { name: skill,  dir: entities/ }       # lookup notes for named skills
  reference:  { name: reference, dir: reference/ }
sources:
  # Work sessions. The transcript is primary; the chronicle is the lossy fallback for sessions
  # whose transcripts have been pruned. See the overlapping-tier guard in
  # .claude/skills/process/SKILL.md section 3.
  - type: session
    description: Full session transcript. Primary tier for work sessions.
    # Glob, not a single directory: worktree sessions land in a sibling project directory whose
    # slug carries the worktree suffix, and they must be queued too.
    path: ~/.claude/projects/*claude-code-plugins*/
    # Top-level only. Subagent transcripts nest one level down, in a directory named for the
    # parent session's UUID, and are not sessions in their own right.
    glob: "*.jsonl"
    # Keyed on the UUID, not the path: a transcript moves between those directories when a
    # worktree is created or removed, and a path key would make a second note for one session.
    identity: "session:{uuid}"
    resolver: meta-claude:session-export
    export-to: .claude/session-exports/             # gitignored; derived artifact, never committed
  - type: chronicle
    description: Post-hoc session journal. Lossy by construction. Fallback when the transcript is gone.
    path: docs/chronicle/
    glob: "20*.md"
    identity: repo-relative path
  - { type: claude-code-docs, resolve: url }        # on-demand, hand-fed — no queue
sinks:
  - { name: tasks, tool: td, project: "claude code marketplace", approval: batch }
promotes-to: ~/Developer/commons
generated:                                 # owned by /graph-patch — applied-delta state
  process:
    template-version: 0.5.0
    applied: [step4-explicit-negative, step8-collect-nonreporting, step9-stamp-gate,
              step11-pull-target, step10-pending-patches, step10-entity-type-gap]
  knowledge-graph:
    template-version: 0.1.8
    applied: []
